<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>052_CRESTIES 개체 관리</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./assets/icons/logo.png" />
  <link rel="apple-touch-icon" href="./assets/icons/logo.png" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <!-- 로그인 화면 -->
  <section id="screen-auth" class="screen" hidden>
    <div class="auth-card">
      <div class="brand">
        <img src="./assets/icons/logo.png" alt="052_CRESTIES" width="64" height="64" style="border-radius:50%" />
        <h1>052_CRESTIES 관리</h1>
        <p class="muted">크레스티드 게코 개체·혈통·분양 관리</p>
      </div>
      <form id="auth-form">
        <label>
          이메일
          <input name="email" type="email" autocomplete="email" required />
        </label>
        <label>
          비밀번호
          <input name="password" type="password" autocomplete="current-password" required minlength="6" />
        </label>
        <div class="auth-actions">
          <button type="submit" data-mode="signin">로그인</button>
          <button type="submit" data-mode="signup" class="ghost">계정 만들기</button>
        </div>
        <p id="auth-error" class="error" role="alert"></p>
      </form>
      <p class="muted small">처음이면 “계정 만들기” → 이메일 확인 후 로그인.</p>
    </div>
  </section>

  <!-- 메인 화면 -->
  <section id="screen-main" class="screen" hidden>
    <header class="topbar">
      <div class="topbar-inner">
        <button id="btn-menu" class="icon-btn" aria-label="메뉴">☰</button>
        <h1 class="title">🦎 052_CRESTIES</h1>
        <button id="btn-add" class="icon-btn primary" aria-label="새 개체">＋</button>
      </div>
      <nav class="tabs" id="view-tabs">
        <button class="tab is-active" data-view="gallery">갤러리</button>
        <button class="tab" data-view="table">전체 표</button>
        <button class="tab" data-view="available">분양가능</button>
        <button class="tab" data-view="sold">분양완료</button>
      </nav>
      <div class="toolbar">
        <input id="search" type="search" placeholder="이름·관리번호·모프 검색" />
      </div>
    </header>

    <main id="content">
      <div class="empty" id="loading">불러오는 중…</div>
    </main>

    <!-- 사이드 메뉴 -->
    <aside id="drawer" class="drawer" hidden>
      <button class="drawer-close" id="btn-drawer-close" aria-label="닫기">✕</button>
      <div class="drawer-content">
        <p id="user-email" class="muted small"></p>
        <button id="btn-logout" class="ghost">로그아웃</button>
        <hr/>
        <p class="muted small">052_CRESTIES v1.0</p>
      </div>
    </aside>
  </section>

  <!-- 개체 편집 모달 -->
  <dialog id="gecko-modal" class="modal">
    <form id="gecko-form" method="dialog">
      <header class="modal-head">
        <h2 id="modal-title">새 개체</h2>
        <button type="button" class="icon-btn" id="btn-modal-close" aria-label="닫기">✕</button>
      </header>

      <div class="modal-body">
        <div class="photo-section">
          <label class="photo-main">
            <span class="photo-label">대표사진</span>
            <input type="file" name="main_photo" accept="image/*" />
            <div class="photo-preview" id="main-preview"></div>
          </label>
          <label class="photo-gallery">
            <span class="photo-label">사진 갤러리 (여러 장)</span>
            <input type="file" name="gallery" accept="image/*" multiple />
            <div class="photo-preview-row" id="gallery-preview"></div>
          </label>
        </div>

        <div class="grid">
          <label>
            이름 *
            <input name="name" required />
          </label>
          <label>
            관리번호
            <input name="management_no" placeholder="CRM-2025-001" />
          </label>

          <label>
            분류
            <select name="category">
              <option>미구분</option>
              <option>수컷</option>
              <option>암컷</option>
              <option>분양완료</option>
            </select>
          </label>
          <label>
            등급
            <select name="grade">
              <option value="">미정</option>
              <option>★</option>
              <option>★★</option>
              <option>★★★</option>
            </select>
          </label>

          <label>
            해칭일
            <input name="hatch_date" type="date" />
          </label>
          <label>
            체중 (g)
            <input name="weight_g" type="number" step="0.1" min="0" />
          </label>

          <label class="span2">
            모프 (쉼표로 구분)
            <input name="morphs" placeholder="Harlequin, Pinstripe, Dalmatian" />
          </label>

          <label>
            분양상태
            <select name="sale_status">
              <option>보유(브리딩)</option>
              <option>분양가능</option>
              <option>예약중</option>
              <option>분양완료</option>
            </select>
          </label>
          <label>
            분양가 (원)
            <input name="sale_price" type="number" step="1000" min="0" />
          </label>

          <label>
            부 (아빠)
            <select name="father_id" data-parent="father"></select>
          </label>
          <label>
            모 (엄마)
            <select name="mother_id" data-parent="mother"></select>
          </label>

          <label class="span2">
            특이사항
            <textarea name="notes" rows="3"></textarea>
          </label>
        </div>

        <section id="offspring-section" hidden>
          <h3>자손</h3>
          <ul id="offspring-list"></ul>
        </section>
      </div>

      <footer class="modal-foot">
        <button type="button" id="btn-delete" class="danger" hidden>삭제</button>
        <div class="spacer"></div>
        <button type="button" id="btn-cancel" class="ghost">취소</button>
        <button type="submit" id="btn-save" class="primary">저장</button>
      </footer>
    </form>
  </dialog>

  <!-- 토스트 -->
  <div id="toast" class="toast" hidden></div>

  <!-- Supabase 클라이언트 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>

  <!-- 앱 스크립트 -->
  <script src="./assets/js/config.js"></script>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
